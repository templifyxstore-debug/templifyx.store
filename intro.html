<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TemplifyX | Loading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --fg: #ffffff;
            --accent: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        canvas#particles {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .logo-container {
            position: relative;
            width: clamp(140px, 28vw, 220px);
            height: clamp(140px, 28vw, 220px);
            margin-bottom: 2.2rem;
            transition: transform 0.1s ease-out;
        }

        .logo-svg {
            width: 100%;
            height: 100%;
            object-fit: contain;
            overflow: visible;
            display: block;
            background: transparent;
            padding: 0;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            animation: logoEntrance 1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards,
                       logoFloat 3.2s ease-in-out 1.2s infinite;
            filter: drop-shadow(0 0 24px rgba(255,255,255,0.16));
        }

        /* Animation Elements */
        .swoosh {
            opacity: 0;
            transform-origin: 50% 50%;
            animation: swooshIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
        }

        .sparkle-main {
            opacity: 0;
            transform-origin: 50% 50%;
            animation: sparkleMain 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.6));
        }

        .sparkle-small-1 {
            opacity: 0;
            transform-origin: 50% 50%;
            animation: sparkleSmall 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.9s forwards;
        }

        .sparkle-small-2 {
            opacity: 0;
            transform-origin: 50% 50%;
            animation: sparkleSmall 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s forwards;
        }

        .brand {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out 1.3s forwards;
            text-align: center;
            line-height: 1;
        }

        .loader-container {
            margin-top: 2rem;
            width: clamp(150px, 40vw, 300px);
            opacity: 0;
            animation: fadeUp 0.6s ease-out 1.5s forwards;
        }

        .loader-track {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            height: 100%;
            width: 0%;
            background: var(--fg);
            border-radius: 4px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .status {
            margin-top: 0.8rem;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            text-align: center;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .skip-btn {
            position: absolute;
            bottom: 2rem;
            right: 2rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0;
            transition: opacity 0.5s ease;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            background: transparent;
            font-family: inherit;
        }

        .skip-btn.visible {
            opacity: 1;
        }

        .skip-btn:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.6);
        }

        /* Keyframes */
        @keyframes swooshIn {
            0% { opacity: 0; transform: scale(0.3) translateX(-30px) rotate(-15deg); }
            100% { opacity: 1; transform: scale(1) translateX(0) rotate(0deg); }
        }

        @keyframes sparkleMain {
            0% { opacity: 0; transform: scale(0.2); }
            60% { transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes sparkleSmall {
            0% { opacity: 0; transform: scale(0); }
            70% { transform: scale(1.3); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes logoEntrance {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-8px) scale(1.02); }
        }

        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(0) translateY(0); }
            25% { transform: rotate(90deg) translateX(0) translateY(0); }
        }

        /* State classes */
        .ready .swoosh,
        .ready .sparkle-main,
        .ready .sparkle-small-1,
        .ready .sparkle-small-2 {
            animation: none;
            opacity: 1;
            transform: scale(1);
        }

        .ready .logo-container {
            animation: gentlePulse 4s ease-in-out infinite;
        }

        .ready .sparkle-small-1,
        .ready .sparkle-small-2 {
            animation: twinkle 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .logo-container {
                width: clamp(160px, 50vw, 240px);
                height: clamp(160px, 50vw, 240px);
            }
            .brand {
                font-size: clamp(1.5rem, 8vw, 2.5rem);
            }
            .loader-container {
                width: clamp(120px, 60vw, 200px);
            }
            .skip-btn {
                bottom: 1.5rem;
                right: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div id="loader">
    <canvas id="particles"></canvas>
    
    <div class="logo-container" id="logoContainer">
        <img class="logo-svg" src="images/logo_only.png" alt="Templify logo" />
    </div>

    <h1 class="brand">TemplifyX</h1>

    <div class="loader-container">
        <div class="loader-track">
            <div class="loader-progress" id="progressBar"></div>
        </div>
        <div class="status" id="statusText">Initializing experience</div>
    </div>

    <button class="skip-btn" id="skipBtn">Skip Intro</button>
</div>

<script>
    (function() {
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const skipBtn = document.getElementById('skipBtn');
        const logoContainer = document.getElementById('logoContainer');
        
        let width, height;
        let particles = [];
        let mouse = { x: null, y: null };
        let animationId;
        let isReady = false;
        let startTime = Date.now();
        const totalLoadTime = 3500; // ms

        // Resize
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        // Particle class
        class Particle {
            constructor() {
                this.reset();
                this.y = Math.random() * height;
            }

            reset() {
                this.x = Math.random() * width;
                this.y = height + 10;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = Math.random() * 0.5 + 0.2;
                this.size = Math.random() * 1.5 + 0.5;
                this.baseAlpha = Math.random() * 0.5 + 0.2;
                this.alpha = this.baseAlpha;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.twinkleOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.y -= this.vy;
                this.x += this.vx;

                // Twinkle
                const time = Date.now() * 0.001;
                this.alpha = this.baseAlpha + Math.sin(time * 2 + this.twinkleOffset) * 0.2;
                this.alpha = Math.max(0.1, Math.min(0.9, this.alpha));

                // Mouse interaction
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        const force = (100 - dist) / 100;
                        this.x += (dx / dist) * force * 0.5;
                        this.y += (dy / dist) * force * 0.5;
                        this.alpha = Math.min(1, this.alpha + force * 0.5);
                    }
                }

                // Wrap
                if (this.y < -20) {
                    this.y = height + 20;
                    this.x = Math.random() * width;
                }
                if (this.x < -20) this.x = width + 20;
                if (this.x > width + 20) this.x = -20;
            }

            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();
            }
        }

        // Init particles
        function initParticles() {
            particles = [];
            const count = Math.min(Math.floor(width * height / 8000), 120);
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        // Animation loop
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // Draw subtle vignette
            const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, Math.max(width, height) * 0.7);
            gradient.addColorStop(0, 'rgba(255,255,255,0.02)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });

            animationId = requestAnimationFrame(animate);
        }
        animate();

        // Mouse tracking
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            // Parallax on logo
            const factor = 0.02;
            const moveX = (e.clientX - width / 2) * factor;
            const moveY = (e.clientY - height / 2) * factor;
            logoContainer.style.transform = `translate(${moveX}px, ${moveY}px)`;
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
                const factor = 0.02;
                const moveX = (e.touches[0].clientX - width / 2) * factor;
                const moveY = (e.touches[0].clientY - height / 2) * factor;
                logoContainer.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        }, { passive: true });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
            logoContainer.style.transform = 'translate(0, 0)';
        });

        // Loading simulation
        function simulateLoading() {
            let progress = 0;
            const interval = setInterval(() => {
                if (isReady) {
                    clearInterval(interval);
                    return;
                }
                progress += Math.random() * 3 + 0.5;
                if (progress > 100) progress = 100;
                
                progressBar.style.width = progress + '%';
                
                if (progress < 30) {
                    statusText.textContent = 'Initializing experience';
                } else if (progress < 60) {
                    statusText.textContent = 'Loading assets';
                } else if (progress < 90) {
                    statusText.textContent = 'Almost there';
                } else {
                    statusText.textContent = 'Ready';
                    clearInterval(interval);
                    completeLoading();
                }
            }, 80);
        }

        function navigateToNextPage() {
            const nextPage = new URLSearchParams(window.location.search).get('next');
            if (!nextPage) return;

            const separator = nextPage.includes('?') ? '&' : '?';
            window.location.replace(`${nextPage}${separator}fromIntro=1`);
        }

        function completeLoading() {
            setTimeout(() => {
                isReady = true;
                loader.classList.add('ready');
                progressBar.style.width = '100%';
                statusText.textContent = 'TemplifyX Ready';

                if (new URLSearchParams(window.location.search).get('next')) {
                    setTimeout(() => {
                        navigateToNextPage();
                    }, 800);
                    return;
                }

                setTimeout(() => {
                    skipBtn.classList.add('visible');
                }, 500);
            }, 300);
        }

        // Skip button
        skipBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isReady = true;
            loader.classList.add('ready');
            progressBar.style.width = '100%';
            statusText.textContent = 'TemplifyX Ready';

            if (new URLSearchParams(window.location.search).get('next')) {
                navigateToNextPage();
                return;
            }

            skipBtn.classList.add('visible');
        });

        // Start
        simulateLoading();

        // Auto-complete after timeout (fallback)
        setTimeout(() => {
            if (!isReady) {
                completeLoading();
            }
        }, totalLoadTime);

        // Handle resize
        window.addEventListener('resize', () => {
            particles = [];
            initParticles();
        });
    })();
</script>

</body>
</html>
